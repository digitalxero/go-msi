name: Test & Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run unit tests
        run: go test -v ./...

      - name: Install MSI verification tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends msitools cabextract osslsigncode

      - name: Cross-check MSI output against msitools + cabextract
        run: ./scripts/verify_msi.sh

      - name: Cache makemsix binary
        id: cache-makemsix
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/makemsix
          key: makemsix-linux-v1

      - name: Build makemsix
        if: steps.cache-makemsix.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y cmake git-lfs
          git clone https://github.com/microsoft/msix-packaging.git /tmp/msix-packaging
          cd /tmp/msix-packaging
          git lfs pull
          ./makelinux.sh --pack --skip-tests
          mkdir -p ~/.local/bin
          cp .vs/bin/makemsix ~/.local/bin/makemsix

      - name: Run integration tests
        env:
          MAKEMSIX_PATH: ~/.local/bin/makemsix
        run: go test -tags integration -v ./...

  windows-patch:
    # Real Windows Installer applies the generated .msp: install the base MSI,
    # apply the patch, and assert the patched + new files on disk. The pure-Go
    # generate->apply oracle (unit tests) and Wine (`task patch-smoke-wine`) are
    # the lower verification tiers; this is the behavioral gate.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Generate base.msi, upgraded.msi, patch.msp
        run: go run ./internal/genpatch ${{ runner.temp }}

      - name: Install base, apply patch, verify (real msiexec)
        shell: pwsh
        run: |
          $d = "${{ runner.temp }}"
          $target = "C:\go-msix-test"
          function Run-Msi($a) {
            $p = Start-Process msiexec -ArgumentList $a -Wait -PassThru -NoNewWindow
            if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) { throw "msiexec $a failed with exit code $($p.ExitCode)" }
          }
          Run-Msi "/i `"$d\base.msi`" /qn TARGETDIR=`"$target`" /l*v `"$d\install.log`""
          $a = Get-ChildItem -Recurse $target -Filter a.exe | Select-Object -First 1
          if (-not $a) { throw "base install did not place a.exe" }
          if ((Get-Content $a.FullName -Raw) -notmatch "ORIGINAL") { throw "base a.exe content unexpected" }
          Write-Host "base install ok"

          Run-Msi "/p `"$d\patch.msp`" /qn /l*v `"$d\patch.log`""
          if ((Get-Content $a.FullName -Raw) -notmatch "PATCHED") { throw "a.exe was not patched" }
          $c = Get-ChildItem -Recurse $target -Filter c.dat | Select-Object -First 1
          if (-not $c) { throw "patch did not add c.dat" }
          if ((Get-Content $c.FullName -Raw) -notmatch "brand-new") { throw "c.dat content unexpected" }
          Write-Host "patch applied: a.exe updated, c.dat added"

      - name: Upload msiexec logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msiexec-logs
          path: ${{ runner.temp }}/*.log

  release:
    runs-on: ubuntu-latest
    needs: [test, windows-patch]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install svu
        run: go install github.com/caarlos0/svu/v3@latest

      - name: Determine version
        id: version
        run: |
          CURRENT=$(svu current)
          NEXT=$(svu next)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$NEXT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump needed ($CURRENT)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version bump: $CURRENT -> $NEXT"
          fi

      - name: Create tag and release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "${{ steps.version.outputs.next }}"
          git push origin "${{ steps.version.outputs.next }}"
          gh release create "${{ steps.version.outputs.next }}" --generate-notes
